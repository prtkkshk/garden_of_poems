<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Chamomile Garden — adyasha</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Nunito:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sage: #7a9e7e;
  --sage-light: #a8c5ab;
  --sage-dark: #4a6e4e;
  --cream: #f9f4ec;
  --cream-dark: #ede5d8;
  --earth: #8b6914;
  --earth-light: #c49a2e;
  --chamomile: #e8c84a;
  --chamomile-light: #f5e08a;
  --brown: #6b4c2a;
  --brown-light: #9a6e44;
  --text: #3a2e1e;
  --text-soft: #6a5440;
  --surface: rgba(255,250,240,0.85);
  --border: rgba(120, 90, 40, 0.15);
}

body {
  background: linear-gradient(160deg, #e8f0e4 0%, #f0e8d8 40%, #e4edd8 100%);
  min-height: 100vh;
  font-family: 'Nunito', sans-serif;
  color: var(--text);
}

/* HEADER */
header {
  background: rgba(255,252,244,0.9);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  padding: 20px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-flower {
  font-size: 24px;
}

.logo-text h1 {
  font-family: 'Lora', serif;
  font-size: 20px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.2;
}

.logo-text p {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--text-soft);
  text-transform: uppercase;
  font-weight: 300;
}

.plant-btn {
  background: var(--sage);
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 20px rgba(122,158,126,0.3);
}

.plant-btn:hover {
  background: var(--sage-dark);
  transform: scale(1.05);
  box-shadow: 0 6px 28px rgba(122,158,126,0.4);
}

/* MAIN */
main {
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

.section-header {
  text-align: center;
  margin-bottom: 48px;
}

.section-header h2 {
  font-family: 'Lora', serif;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 8px;
}

.section-header p {
  font-size: 14px;
  color: var(--text-soft);
  letter-spacing: 1px;
}

/* GARDEN GRID */
.garden-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 24px;
}

/* GARDEN TILE */
.garden-tile {
  background: rgba(255,252,244,0.8);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px 20px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.06);
}

.garden-tile::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--tile-color, rgba(122,158,126,0.05));
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: inherit;
}

.garden-tile:hover::before { opacity: 1; }

.garden-tile:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 12px 36px rgba(0,0,0,0.1);
  border-color: var(--sage-light);
}

.tile-emoji {
  font-size: 40px;
  margin-bottom: 12px;
  display: block;
  animation: gentleSway 4s ease-in-out infinite;
}

.tile-emoji:nth-child(2) { animation-delay: 0.5s; }
.tile-emoji:nth-child(3) { animation-delay: 1s; }

.tile-title {
  font-family: 'Lora', serif;
  font-size: 16px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 6px;
  line-height: 1.3;
}

.tile-preview {
  font-size: 12px;
  color: var(--text-soft);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  font-style: italic;
}

.tile-meta {
  margin-top: 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.water-count {
  font-size: 11px;
  color: var(--sage);
  display: flex;
  align-items: center;
  gap: 4px;
}

.tile-tag {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: var(--cream-dark);
  color: var(--text-soft);
  padding: 3px 10px;
  border-radius: 20px;
}

/* ADD TILE */
.add-tile {
  background: transparent;
  border: 2px dashed rgba(122,158,126,0.3);
  border-radius: 20px;
  padding: 24px 20px;
  cursor: pointer;
  transition: all 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 160px;
  gap: 12px;
  color: var(--sage);
}

.add-tile:hover {
  border-color: var(--sage);
  background: rgba(122,158,126,0.05);
  transform: scale(1.02);
}

.add-tile .plus { font-size: 28px; }
.add-tile p { font-size: 13px; color: var(--text-soft); }

/* DRAWER / POEM MODAL */
.drawer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(58, 46, 30, 0.35);
  backdrop-filter: blur(4px);
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
}

.drawer-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: min(520px, 100vw);
  background: var(--cream);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.34, 1.2, 0.64, 1);
  box-shadow: -20px 0 60px rgba(0,0,0,0.1);
  border-radius: 24px 0 0 24px;
  overflow: hidden;
}

.drawer-overlay.open .drawer {
  transform: translateX(0);
}

.drawer-header {
  padding: 32px 32px 24px;
  background: rgba(255,252,244,0.95);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.drawer-emoji { font-size: 36px; }

.drawer-title-area { flex: 1; }

.drawer-title {
  font-family: 'Lora', serif;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 4px;
}

.drawer-author {
  font-size: 13px;
  color: var(--text-soft);
  letter-spacing: 1px;
  font-style: italic;
}

.drawer-close {
  background: transparent;
  border: none;
  color: var(--text-soft);
  cursor: pointer;
  font-size: 20px;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}

.drawer-close:hover {
  background: var(--cream-dark);
  color: var(--text);
}

.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 32px;
}

.drawer-poem {
  font-family: 'Lora', serif;
  font-size: 16px;
  font-style: italic;
  line-height: 2.1;
  color: var(--text);
  white-space: pre-wrap;
}

.drawer-footer {
  padding: 24px 32px;
  background: rgba(255,252,244,0.95);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.water-btn {
  background: var(--cream-dark);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 10px 20px;
  font-family: 'Nunito', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-soft);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.water-btn:hover {
  background: rgba(42, 157, 143, 0.1);
  border-color: rgba(42,157,143,0.3);
  color: #2a9d8f;
  transform: scale(1.05);
}

.water-count-display {
  font-size: 12px;
  color: var(--text-soft);
}

/* ADD MODAL */
.add-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(58,46,30,0.4);
  backdrop-filter: blur(8px);
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.add-modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.add-modal {
  background: var(--cream);
  border-radius: 24px;
  padding: 40px;
  max-width: 480px;
  width: 100%;
  box-shadow: 0 32px 80px rgba(0,0,0,0.2);
  transform: scale(0.92) translateY(16px);
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.add-modal-overlay.open .add-modal {
  transform: scale(1) translateY(0);
}

.add-modal h3 {
  font-family: 'Lora', serif;
  font-size: 22px;
  margin-bottom: 24px;
  color: var(--text);
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 8px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  background: rgba(255,252,244,0.8);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  font-family: 'Lora', serif;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  resize: vertical;
}

.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(122,158,126,0.1);
}

.form-group textarea { min-height: 160px; line-height: 1.8; font-style: italic; }

.modal-actions {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 28px;
}

.cancel-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 12px 24px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  color: var(--text-soft);
  cursor: pointer;
  transition: all 0.2s;
}

.cancel-btn:hover { background: var(--cream-dark); }

.save-btn {
  background: var(--sage);
  border: none;
  border-radius: 50px;
  padding: 12px 28px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: white;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 4px 16px rgba(122,158,126,0.3);
}

.save-btn:hover {
  background: var(--sage-dark);
  transform: scale(1.04);
}

/* CONFETTI */
.confetti-piece {
  position: fixed;
  pointer-events: none;
  z-index: 500;
  border-radius: 50%;
  animation: confettiFall var(--dur) ease forwards;
}

@keyframes confettiFall {
  0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translateY(120px) scale(0) rotate(var(--rot)); opacity: 0; }
}

@keyframes gentleSway {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-flower">🌼</div>
    <div class="logo-text">
      <h1>The Chamomile Garden</h1>
      <p>A private space for poetry</p>
    </div>
  </div>
  <button class="plant-btn" onclick="openAddModal()">
    <span>🌱</span> Plant a Thought
  </button>
</header>

<main>
  <div class="section-header">
    <h2>Your Garden</h2>
    <p>Each poem is a seed. Each reading, a watering.</p>
  </div>

  <div class="garden-grid" id="gardenGrid"></div>
</main>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer(event)">
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-emoji" id="drawerEmoji">🌼</div>
      <div class="drawer-title-area">
        <div class="drawer-title" id="drawerTitle">–</div>
        <div class="drawer-author">— adyasha</div>
      </div>
      <button class="drawer-close" onclick="closeDrawerDirect()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="drawer-poem" id="drawerPoem"></div>
    </div>
    <div class="drawer-footer">
      <button class="water-btn" id="waterBtn" onclick="waterPoem()">
        <span>🪣</span> Water this
      </button>
      <span class="water-count-display" id="waterCountDisplay">0 waterings</span>
    </div>
  </div>
</div>

<!-- Add Modal -->
<div class="add-modal-overlay" id="addModalOverlay">
  <div class="add-modal">
    <h3>🌱 Plant a New Thought</h3>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="inputTitle" placeholder="Name your poem..." maxlength="60">
    </div>
    <div class="form-group">
      <label>The poem</label>
      <textarea id="inputPoem" placeholder="Let the words bloom here..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="cancel-btn" onclick="closeAddModal()">Cancel</button>
      <button class="save-btn" onclick="plantPoem()">Plant it 🌱</button>
    </div>
  </div>
</div>

<script>
const EMOJIS = ['🌼','🌿','🌊','🌙','🍃','✨','🌱','🪷','🌾','🍂','🌸','💧'];
const TAGS = ['ocean','soul','time','loss','growth','love','blue','wonder'];

const DEFAULT_POEMS = [
  {
    id: 1,
    emoji: '🌼',
    title: 'cloud nine hollows',
    tag: 'soul',
    text: `all the experiences in life.
down the shallows and depths,
up in cloud nine,
all the extremes,
and everything else in between.


to be omnipresent
and
to be nowhere at all at the same time.


to feel everything
and
to be numb at the same time.

"oh, how i love it and i hate it at the same time.
same skies but different eyes,
same places but different lives.
painting everything red
on the days it turns blue"

loving it and hating it at the same time.
dying and living through it,
breathing just the same-
filling voids just the same,
like always.`,
    waters: 7
  },
  {
    id: 2,
    emoji: '🌊',
    title: 'depths',
    tag: 'ocean',
    text: `i just want to disappear silently.
without causing any noise
swift movements
till i reach the shore,
and waft away with the salty-humid wind.

they say the sea remembers everything,
so i make sure that i wipe off my footprints
as i move forward on the wet sandy soils.

seashells pricking their sharp edges underneath my feet
i pick it up, wipe it on my yellow summer dress
and keep it inside my crochet bag
— a memoir.

i feel the warm dense waves engulfing me,
as i walk deeper into the ocean.
i beg to be forgotten
because i don't want them returning me back to the shore.

i belong to the ocean now
another world to thrive in,
before it wears off me
like one of my favourite faded sweaters.`,
    waters: 12
  },
  {
    id: 3,
    emoji: '🌙',
    title: 'A Place I Once Was',
    tag: 'loss',
    text: `I do not know when the world let go of me.
Perhaps it was slow, like a tide retreating,
pulling grain by grain until nothing remained.
Or perhaps I slipped through its fingers all at once,
a whisper lost in a storm,
too quiet to be missed.

The stars still shine,
but they do not blink in recognition.
The sun still rises,
but it does not warm my skin.
The streets are still crowded,
but no footsteps fall in rhythm with mine.

I call out, but the air swallows my voice.
I reach, but my hands close around nothing.
I stand among them, beside them, within them—
and yet, I am nowhere at all.

My name lingers on the edges of memory,
a sound no longer spoken,
a shape no longer known.
I was here once.
I was loved once.
I think.

But time does not grieve.
The world does not mourn.
And soon, I will be nothing more
than a place I once was.`,
    waters: 21
  },
  {
    id: 4,
    emoji: '🌿',
    title: 'Growing Pains',
    tag: 'growth',
    text: `i have outgrown the things I once loved
drawing, reading, writing,
Disney movies, tiny dolls,
cartoons that used to be everything.
now just waves of nostalgia,
once part of our everyday life.
change, a necessary life shift,
once harsh, now just a reality.

//metamorphosis, a dancing transformation.
shedding of old skin//

letting go of what i once loved
becomes a pathway to growth.
changing views of the "real world,"
i gave up childhood whimsies
a choreographed journey into adulthood,
where simplicity gave way to complexity.

after all,
you are the only constant wave in the ocean,
no one else stays or remains.
make it happen for you, at least?`,
    waters: 9
  },
  {
    id: 5,
    emoji: '💧',
    title: 'the calm before the storm',
    tag: 'blue',
    text: `"a symphony of thunderstorms,
the waves of sadness sweep across my shore,
leaving behind your remnants,
just like the sea leaves behind seashells on the shore."


silent seas,
tranquil minds,
hushed conversations.
all the words that were left unsaid,
between you and me.
unfinished stories,
paintings half done- only sketches no colour.
food without seasoning,
you add the charm like the cherry on a cake.


serene sunsets,
starry nights,
just before the tsunami hits,
we are aloof,
of the ruins consummated by the water,
which engulfs all.


withdrawn,
from reality,
the aftermath of some occurrences is always drastic,
beknown to either of us.`,
    waters: 5
  },
  {
    id: 6,
    emoji: '🪷',
    title: 'attachment — a hoax rendering',
    tag: 'love',
    text: `"are we okay?", i ask

referring to us
"i am okay"
first person pronoun

love
is hoax.
that's what it is.
do i let you down? do i bring you down? are u ashamed of me?
do you want to call it quits?

you come when you feel out of touch,
with yourself,
with all.
that temporary passing,
when the sea fills up,
you leave.
your job is done here.

//ghosting//
you pay a visit,
do as you you feel,
a futile act of play for you.
unbeknownst to me.
that,
it's a play for you,
while i live out the character`,
    waters: 14
  },
  {
    id: 7,
    emoji: '✨',
    title: 'the solitary wave',
    tag: 'ocean',
    text: `i would love to live right at the brink of reality,
little too edgy for even myself.

so i float on the surface,
hoping to be never found again
by any pair of eyes i have ever met my own with.

drowning my compass into the deep waters
because i don't want a clear route now.
so i float along with the direction in which the waves propagate.

i'm tired of swimming now,

so i just float away

till i lose my way back home.`,
    waters: 18
  }
];

let poems = [...DEFAULT_POEMS];
let activePoem = null;

function renderGarden() {
  const grid = document.getElementById('gardenGrid');
  grid.innerHTML = '';

  poems.forEach(poem => {
    const tile = document.createElement('div');
    tile.className = 'garden-tile';
    tile.style.setProperty('--tile-color', getTileColor(poem.tag));
    tile.innerHTML = `
      <span class="tile-emoji">${poem.emoji}</span>
      <div class="tile-title">${poem.title}</div>
      <div class="tile-preview">${poem.text.slice(0, 80)}...</div>
      <div class="tile-meta">
        <div class="water-count">💧 ${poem.waters}</div>
        <span class="tile-tag">${poem.tag}</span>
      </div>
    `;
    tile.addEventListener('click', () => openDrawer(poem));
    grid.appendChild(tile);
  });

  // Add tile
  const addTile = document.createElement('div');
  addTile.className = 'add-tile';
  addTile.innerHTML = `<div class="plus">+</div><p>Plant a new thought</p>`;
  addTile.onclick = openAddModal;
  grid.appendChild(addTile);
}

function getTileColor(tag) {
  const map = {
    ocean: 'rgba(42,157,143,0.06)',
    soul: 'rgba(122,158,126,0.08)',
    time: 'rgba(168,139,90,0.06)',
    loss: 'rgba(100,100,130,0.06)',
    growth: 'rgba(100,160,100,0.08)',
    love: 'rgba(200,100,100,0.05)',
    blue: 'rgba(80,100,180,0.06)',
    wonder: 'rgba(200,160,80,0.07)'
  };
  return map[tag] || 'rgba(122,158,126,0.05)';
}

function openDrawer(poem) {
  activePoem = poem;
  document.getElementById('drawerEmoji').textContent = poem.emoji;
  document.getElementById('drawerTitle').textContent = poem.title;
  document.getElementById('drawerPoem').textContent = poem.text;
  document.getElementById('waterCountDisplay').textContent = poem.waters + ' waterings';
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer(e) {
  if (e.target === document.getElementById('drawerOverlay')) closeDrawerDirect();
}

function closeDrawerDirect() {
  document.getElementById('drawerOverlay').classList.remove('open');
}

function waterPoem() {
  if (!activePoem) return;
  activePoem.waters++;
  document.getElementById('waterCountDisplay').textContent = activePoem.waters + ' waterings';
  spawnConfetti();
  renderGarden();
}

function spawnConfetti() {
  const btn = document.getElementById('waterBtn');
  const rect = btn.getBoundingClientRect();
  const colors = ['#7a9e7e','#e8c84a','#2a9d8f','#c49a2e','#a8c5ab','#7fb3c8'];

  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = Math.random() * 8 + 4;
    el.style.cssText = `
      left: ${rect.left + rect.width/2 + (Math.random()-0.5)*60}px;
      top: ${rect.top}px;
      width: ${size}px;
      height: ${size}px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      --dur: ${0.6 + Math.random()*0.6}s;
      --rot: ${(Math.random()-0.5)*180}deg;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
}

function openAddModal() {
  document.getElementById('addModalOverlay').classList.add('open');
  document.getElementById('inputTitle').focus();
}

function closeAddModal() {
  document.getElementById('addModalOverlay').classList.remove('open');
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputPoem').value = '';
}

function plantPoem() {
  const title = document.getElementById('inputTitle').value.trim();
  const text = document.getElementById('inputPoem').value.trim();
  if (!title || !text) return;

  const newPoem = {
    id: Date.now(),
    emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
    title,
    tag: TAGS[Math.floor(Math.random() * TAGS.length)],
    text,
    waters: 0
  };

  poems.unshift(newPoem);
  closeAddModal();
  renderGarden();

  // Animate new tile
  setTimeout(() => {
    const tiles = document.querySelectorAll('.garden-tile');
    if (tiles[0]) {
      tiles[0].style.animation = 'none';
      tiles[0].style.opacity = '0';
      tiles[0].style.transform = 'scale(0.8)';
      setTimeout(() => {
        tiles[0].style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
        tiles[0].style.opacity = '1';
        tiles[0].style.transform = '';
      }, 50);
    }
  }, 50);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeDrawerDirect();
    closeAddModal();
  }
});

renderGarden();
</script>
</body>
</html>
